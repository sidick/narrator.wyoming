# pcmplay settings (read from cwd at startup). All optional; defaults shown.
file fixture.pcm
rate 22050
channels 1
# AHI audio mode. Default = paula HiFi 14-bit mono calibrated (production).
# For a first bring-up, prove capture works with a plain Paula mode first:
#   mode 0x00020004     ; Paula:8 bit mono
mode 0x0002000f
