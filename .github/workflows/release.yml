# Tag-driven release. The flow is:
#
#   1. Locally, `make release` tags v<VERSION>.<REVISION> at HEAD and builds
#      the archive (see CLAUDE.md "Versioning").
#   2. `git push --follow-tags` pushes both the commit and the tag.
#   3. The tag push triggers this workflow.
#   4. The workflow rebuilds the archive from scratch in CI (so the artifact
#      attached to the GitHub Release is reproducible from public CI, not
#      just from one developer's machine), then creates a GitHub Release
#      with the lha + Aminet readme attached and auto-generated notes from
#      the commits since the previous tag.
#
# Aminet upload is still manual -- Aminet has no API and the maintainers
# gatekeep submissions. The GitHub Release is a second canonical source so
# users can fetch the artifact even before Aminet processes the submission.

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to create the release + attach artifacts

jobs:
  release:
    name: Build archive + attach to GitHub Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history for auto-generated release notes between tags.
          fetch-depth: 0

      - name: Build archive
        run: make dist

      - name: Sanity-check archive contents
        run: |
          docker run --rm -v "$(pwd)":/work -w /work \
            stefanreinauer/amiga-gcc@sha256:68f3233fe3b270654b471e11e0b2e25fae0ac34350959b5be360c9af84ef388a \
            lha l build/NarratorWyomingDev.lha

      # Two different naming conventions for the two distribution channels:
      #
      #   Aminet  uses the unversioned name (NarratorWyomingDev.lha) -- the
      #           uploaded .readme's "Version:" field plus Aminet's own slot
      #           encode the version. `make dist` already produces these.
      #
      #   GitHub  Releases embed the version in the release URL, but the
      #           file travels outside that context once downloaded -- so
      #           name the asset NarratorWyomingDev-44.0.lha (and matching
      #           readme) for clarity in downloads folders, comparisons,
      #           and bug reports. Stage versioned copies here and attach
      #           those.
      #
      # ${GITHUB_REF_NAME#v} strips the leading "v" from the tag so the
      # version in the filename matches the readme's "Version:" line.
      - name: Stage versioned copies for the GitHub Release
        run: |
          V="${GITHUB_REF_NAME#v}"
          cp build/NarratorWyomingDev.lha "build/NarratorWyomingDev-${V}.lha"
          cp NarratorWyomingDev.readme    "build/NarratorWyomingDev-${V}.readme"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # ${GITHUB_REF_NAME} is the tag (e.g. v44.0). Use it as both the
          # title suffix and the release tag.
          V="${GITHUB_REF_NAME#v}"
          gh release create "${GITHUB_REF_NAME}" \
            --title "narrator.wyoming ${GITHUB_REF_NAME}" \
            --generate-notes \
            "build/NarratorWyomingDev-${V}.lha" \
            "build/NarratorWyomingDev-${V}.readme"
